<!DOCTYPE html>
<html>
<head>
<title>Dynamic Job Cards</title>
<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:#d698b8;
}
header{
background:#ff6fa1;
color:white;
padding:25px;
text-align:center;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}
.form-box{
background:white;
width:90%;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
input,textarea,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}
button{
background:#ff6fa1;
color:white;
border:none;
cursor:pointer;
}
button:hover{
background:#ff4f8b;
}
.cards{
display:grid;
gap:15px;
padding:20px;
}
.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
.card h3{
color:#ff6fa1;
margin:5px 0;
}
</style>
</head>

<body>

<header>
<h1>Job Posting Form</h1>
<p>Create and view job cards dynamically</p>
</header>

<div class="form-box">
<form id="jobForm">
<input type="text" id="title" placeholder="Job Title" required>
<input type="text" id="company" placeholder="Company Name" required>
<input type="text" id="location" placeholder="Location" required>
<textarea id="description" placeholder="Job Description" required></textarea>
<button type="submit">Post Job</button>
</form>
</div>

<div class="cards" id="jobCards">
<div class="card">
<h3>Web Developer</h3>
<p><b>Company:</b> CodeWave</p>
<p><b>Location:</b> Delhi</p>
<p>Build and maintain modern websites.</p>
</div>
<div class="card">
<h3>UI Designer</h3>
<p><b>Company:</b> PixelLab</p>
<p><b>Location:</b> Mumbai</p>
<p>Design user-friendly interfaces.</p>
</div>
</div>

<script>
jobForm.onsubmit=function(e){
e.preventDefault()
let card=document.createElement("div")
card.className="card"
card.innerHTML="<h3>"+title.value+"</h3><p><b>Company:</b> "+company.value+"</p><p><b>Location:</b> "+location.value+"</p><p>"+description.value+"</p>"
jobCards.appendChild(card)
jobForm.reset()
}
</script>

</body>
</html>
