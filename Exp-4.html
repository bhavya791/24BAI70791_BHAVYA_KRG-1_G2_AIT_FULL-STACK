<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Job Cards</title>

<style>
body{
    font-family: "Segoe UI", sans-serif;
    background:  #fbc2eb;
    padding:20px;
}

h2{
    text-align:center;
    color:#333;
}

.form-box{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 15px rgba(0,0,0,0.1);
    max-width:500px;
    margin:20px auto;
}

label{
    font-weight:600;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:6px 0 12px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#a66cff;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#8c52ff;
}

.jobs{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:15px;
    margin-top:20px;
}

.job-card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}


.job-card h3{
    margin:0;
    color:#6c3cff;
}

.job-card p{
    margin:5px 0;
}

.job-card span{
    font-weight:bold;
}

.remove-btn{
    margin-top:10px;
    background:#ff6b6b;
    border:none;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.remove-btn:hover{
    background:#e64545;
}

@media (max-width:600px){
    .form-box{
        margin:10px;
    }
}
</style>
</head>

<body>

<h2> Job Posting Form </h2>

<div class="form-box">
    <label>Job Title</label>
    <input type="text" id="title">

    <label>Company Name</label>
    <input type="text" id="company">

    <label>Location</label>
    <input type="text" id="location">

    <label>Job Description</label>
    <textarea id="description"></textarea>

    <button id="addJob">Add Job</button>
</div>

<h2> Available Jobs</h2>
<div class="jobs" id="jobList"></div>

<script>
document.getElementById("addJob").addEventListener("click", function(){

    let title = document.getElementById("title").value;
    let company = document.getElementById("company").value;
    let location = document.getElementById("location").value;
    let description = document.getElementById("description").value;

    if(title=="" || company=="" || location=="" || description==""){
        alert("Please fill all fields before adding a job card.");
        return;
    }

    let card = document.createElement("div");
    card.className = "job-card";

    card.innerHTML = `
        <h3>${title}</h3>
        <p><span>Company:</span> ${company}</p>
        <p><span>Location:</span> ${location}</p>
        <p><span>Description:</span> ${description}</p>
        <button class="remove-btn">Remove</button>
    `;

    card.querySelector(".remove-btn").addEventListener("click", function(){
        card.remove();
    });

    document.getElementById("jobList").appendChild(card);

    document.getElementById("title").value = "";
    document.getElementById("company").value = "";
    document.getElementById("location").value = "";
    document.getElementById("description").value = "";

    alert("Job Card Added Successfully ");
});
</script>

</body>
</html>
